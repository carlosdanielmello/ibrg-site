<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS - IBRG</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        /* Estilos personalizados para o CMS */
        :root {
            --primary-color: #C2994D;
            --primary-dark: #A67C36;
        }
        
        /* Remove o preview feio */
        .cms-preview {
            display: none !important;
        }
        
        /* Personaliza o header */
        .nc-app-header {
            background-color: #1f2937 !important;
        }
        
        /* Personaliza a sidebar */
        .nc-app-sidebar {
            background-color: #111827 !important;
        }
        
        /* Botão principal */
        .nc-button-primary {
            background-color: var(--primary-color) !important;
        }
        
        .nc-button-primary:hover {
            background-color: var(--primary-dark) !important;
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        // Configuração do CMS em português e sem preview
        CMS.init({
            config: {
                backend: {
                    name: 'git-gateway',
                    branch: 'main'
                },
                media_folder: 'img/uploads',
                public_folder: '/img/uploads',
                locale: 'pt-br',
                show_preview_links: false,
                
                collections: [
                    {
                        name: 'configuracoes',
                        label: 'Configurações do Site',
                        label_singular: 'Configuração',
                        folder: 'data',
                        files: [
                            {
                                name: 'missionarios',
                                label: 'Missionários',
                                file: 'data/missionarios.json',
                                description: 'Lista completa de missionários apoiados pela igreja',
                                fields: [
                                    {
                                        label: 'Missionários',
                                        name: 'missionarios',
                                        widget: 'list',
                                        summary: '{{fields.name}}',
                                        label_singular: 'Missionário',
                                        fields: [
                                            { label: 'Nome', name: 'name', widget: 'string' },
                                            { label: 'Descrição', name: 'description', widget: 'text' },
                                            { label: 'Igreja', name: 'church', widget: 'string' },
                                            { label: 'Localização', name: 'location', widget: 'string' },
                                            { label: 'Cidade', name: 'city', widget: 'string' },
                                            {
                                                label: 'Estado (UF)',
                                                name: 'state',
                                                widget: 'select',
                                                options: [
                                                    { label: 'Acre (AC)', value: 'AC' },
                                                    { label: 'Alagoas (AL)', value: 'AL' },
                                                    { label: 'Amapá (AP)', value: 'AP' },
                                                    { label: 'Amazonas (AM)', value: 'AM' },
                                                    { label: 'Bahia (BA)', value: 'BA' },
                                                    { label: 'Ceará (CE)', value: 'CE' },
                                                    { label: 'Distrito Federal (DF)', value: 'DF' },
                                                    { label: 'Espírito Santo (ES)', value: 'ES' },
                                                    { label: 'Goiás (GO)', value: 'GO' },
                                                    { label: 'Maranhão (MA)', value: 'MA' },
                                                    { label: 'Mato Grosso (MT)', value: 'MT' },
                                                    { label: 'Mato Grosso do Sul (MS)', value: 'MS' },
                                                    { label: 'Minas Gerais (MG)', value: 'MG' },
                                                    { label: 'Pará (PA)', value: 'PA' },
                                                    { label: 'Paraíba (PB)', value: 'PB' },
                                                    { label: 'Paraná (PR)', value: 'PR' },
                                                    { label: 'Pernambuco (PE)', value: 'PE' },
                                                    { label: 'Piauí (PI)', value: 'PI' },
                                                    { label: 'Rio de Janeiro (RJ)', value: 'RJ' },
                                                    { label: 'Rio Grande do Norte (RN)', value: 'RN' },
                                                    { label: 'Rio Grande do Sul (RS)', value: 'RS' },
                                                    { label: 'Rondônia (RO)', value: 'RO' },
                                                    { label: 'Roraima (RR)', value: 'RR' },
                                                    { label: 'Santa Catarina (SC)', value: 'SC' },
                                                    { label: 'São Paulo (SP)', value: 'SP' },
                                                    { label: 'Sergipe (SE)', value: 'SE' },
                                                    { label: 'Tocantins (TO)', value: 'TO' }
                                                ]
                                            },
                                            {
                                                label: 'País',
                                                name: 'country',
                                                widget: 'select',
                                                options: [
                                                    { label: 'Brasil', value: 'Brasil' },
                                                    { label: 'Venezuela', value: 'Venezuela' },
                                                    { label: 'Bolívia', value: 'Bolívia' },
                                                    { label: 'Portugal', value: 'Portugal' },
                                                    { label: 'Estados Unidos', value: 'EUA' },
                                                    { label: 'Outro', value: 'Outro' }
                                                ]
                                            },
                                            { label: 'Telefone/WhatsApp', name: 'phone', widget: 'string', required: false },
                                            { label: 'Imagem do Missionário', name: 'image', widget: 'image', required: false },
                                            {
                                                label: 'Agência Base',
                                                name: 'base',
                                                widget: 'select',
                                                default: 'Igreja Batista Regular da Graça',
                                                options: [
                                                    { label: 'Igreja Batista Regular da Graça', value: 'Igreja Batista Regular da Graça' },
                                                    { label: 'Paulo de Tarso', value: 'Paulo de Tarso' },
                                                    { label: 'MAB', value: 'MAB' },
                                                    { label: 'MBBF', value: 'MBBF' },
                                                    { label: 'Maranata', value: 'Maranata' },
                                                    { label: 'Novas Tribos', value: 'Novas Tribos' },
                                                    { label: 'Independente', value: 'Independente' }
                                                ]
                                            },
                                            { label: 'Logo da Agência', name: 'baseImg', widget: 'image', required: false }
                                        ]
                                    }
                                ]
                            }
                        ]
                    }
                ]
            }
        });
    </script>
</body>
</html>
