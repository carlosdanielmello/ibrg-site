backend:
  name: git-gateway
  branch: main

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "configuracoes"
    label: "Configurações do Site IBRG"
    files:
      - name: "missionarios"
        label: "Missionários"
        file: "data/missionarios.json"
        description: "Lista completa de missionários apoiados pela igreja"
        fields:
          - label: "Missionários"
            name: "missionarios"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "Descrição", name: "description", widget: "text"}
              - {label: "Igreja", name: "church", widget: "string"}
              - {label: "Localização (comunidade ou cidade)", name: "location", widget: "string"}
              - {label: "Cidade", name: "city", widget: "string"}
              - {label: "Estado (UF)", name: "state", widget: "string", hint: "Exemplo: AM, SP, RJ, ou escreva o estado completo"}
              - {label: "País", name: "country", widget: "select", options: [{label: "Brasil", value: "Brasil"}, {label: "Venezuela", value: "Venezuela"}, {label: "Bolívia", value: "Bolívia"}, {label: "Portugal", value: "Portugal"}, {label: "Estados Unidos", value: "EUA"}, {label: "Outro", value: "Outro"}]}
              - {label: "Telefone/WhatsApp", name: "phone", widget: "string", required: false}
              - {label: "Imagem do Missionário", name: "image", widget: "image", required: false}
              - label: "Agência Base"
                name: "base"
                widget: "select"
                default: "Igreja Batista Regular da Graça"
                options:
                  - {label: "Igreja Batista Regular da Graça (logo padrão)", value: "Igreja Batista Regular da Graça"}
                  - {label: "Paulo de Tarso", value: "Paulo de Tarso"}
                  - {label: "MAB", value: "MAB"}
                  - {label: "MBBF", value: "MBBF"}
                  - {label: "Maranata", value: "Maranata"}
                  - {label: "Novas Tribos", value: "Novas Tribos"}
                  - {label: "Independente (sem logo)", value: "Independente"}

      - name: "programacoes"
        label: "Programações"
        file: "data/programacoes.json"
        description: "Lista de programações e atividades da igreja"
        fields:
          - label: "Programações"
            name: "programacoes"
            widget: "list"
            summary: "{{fields.titulo}} - {{fields.dia}} às {{fields.horario}}"
            fields:
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Dia da semana", name: "dia", widget: "string", hint: "Exemplo: Domingo, Segunda-feira, Quarta-feira, Sábado"}
              - {label: "Horário", name: "horario", widget: "string", hint: "Exemplo: 8h30, 19h, 18h"}
              - {label: "Descrição", name: "descricao", widget: "text"}
              - {label: "Imagem ilustrativa", name: "imagem", widget: "image", required: false}

      - name: "congregacoes"
        label: "Congregações"
        file: "data/congregacoes.json"
        description: "Lista de congregações da igreja"
        fields:
          - label: "Congregações"
            name: "congregacoes"
            widget: "list"
            summary: "{{fields.nome}} - {{fields.pastor}}"
            fields:
              - {label: "Nome da Congregação", name: "nome", widget: "string"}
              - {label: "Pastor Responsável", name: "pastor", widget: "string"}
              - {label: "Localização", name: "localizacao", widget: "string", hint: "Exemplo: Manaus/AM"}
              - {label: "Descrição", name: "descricao", widget: "text"}
              - {label: "Imagem da Congregação", name: "imagem", widget: "image", required: false}
              - {label: "Link para Google Maps (Como chegar)", name: "directionsUrl", widget: "string", required: false}
              - {label: "Link para WhatsApp/Contato", name: "contactUrl", widget: "string", required: false}